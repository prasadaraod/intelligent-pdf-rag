

services:
  chromadb:
    image: chromadb/chroma:latest
    # 1. Enforces the same container name every single time it boots
    container_name: intelligent-pdf-rag-chromadb
    ports:
      - "8000:8000"
    volumes:
      # Maps your local host folder to the internal data folder
      - ./chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      # Point the database engine compiler target to read from /data
      - PERSIST_DIRECTORY=/data
      - ANONYMOUS_TELEMETRY=FALSE
    # Ensures the container runs with root permissions internally to fluidly write to your local ./chroma_data folder
    user: "root"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligent-pdf-rag-backend
    ports:
      - "5000:5000"
    # CRUCIAL: Tells Docker Compose where to find the variables for interpolation
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=5000
      - CHROMA_CLUSTER_URL=${CHROMA_CLUSTER_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    # Ensures the backend won't execute until ChromaDB is fully up and running
    depends_on:
      - chromadb
    restart: always